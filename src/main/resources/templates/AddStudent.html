<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Add Student</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<nav>
    <h1>🎓 Attendance System</h1>
    <a href="/">Home</a>
    <a th:href="@{/markPage}">Mark Attendance</a>
    <a th:href="@{/reportAttendance}">Report</a>
    <a href="/addstudents" class="active">Add Student</a>

    <!-- User menu — self-contained with inline positioning -->
    <div style="position:relative; margin-left:auto;">
        <div onclick="toggleUserMenu()" style="
            width:36px; height:36px; border-radius:50%;
            background:rgba(255,255,255,0.2);
            border:1.5px solid rgba(255,255,255,0.4);
            display:flex; align-items:center; justify-content:center;
            cursor:pointer;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                 stroke="#fff" stroke-width="2"
                 stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="8" r="4"/>
                <path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/>
            </svg>
        </div>

        <div id="userDropdown" style="
            display:none; position:absolute;
            top:46px; right:0;
            width:200px; background:#fff;
            border:1px solid #e0e0e0;
            border-radius:12px;
            box-shadow:0 8px 24px rgba(0,0,0,0.15);
            z-index:9999; overflow:hidden;">

            <!-- Header -->
            <div style="display:flex; align-items:center; gap:10px; padding:14px;">
                <div style="width:36px;height:36px;background:#EAF3DE;border-radius:50%;
                            display:flex;align-items:center;justify-content:center;font-size:16px;">
                    🧑‍🏫
                </div>
                <div>
                    <div style="font-size:13px;font-weight:600;color:#1a1a2e;"
                         th:text="${session.userName} ?: 'User'">User</div>
                    <div style="font-size:11px;color:#3B6D11;font-weight:500;"
                         th:text="${session.role == 'TEACHER' ? '📋 Teacher' : '🎓 Student'}">📋 Role</div>
                </div>
            </div>

            <div style="height:1px;background:#f0f0f0;"></div>

            <a th:href="@{/profile}"  style="display:block;padding:10px 14px;font-size:13px;
                color:#1a1a2e;text-decoration:none;" onmouseover="this.style.background='#f5f7ff'"
               onmouseout="this.style.background='transparent'">👤 Profile</a>

            <a th:href="@{/settings}" style="display:block;padding:10px 14px;font-size:13px;
                color:#1a1a2e;text-decoration:none;" onmouseover="this.style.background='#f5f7ff'"
               onmouseout="this.style.background='transparent'">⚙️ Settings</a>

            <div style="height:1px;background:#f0f0f0;"></div>

            <a th:href="@{/logout}"   style="display:block;padding:10px 14px;font-size:13px;
                color:#a32d2d;text-decoration:none;" onmouseover="this.style.background='#fcebeb'"
               onmouseout="this.style.background='transparent'">🔓 Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card">
        <h2>➕ Add New Student</h2>

        <div th:if="${session.role == 'TEACHER'}">

            <div class="teacher-banner">
                <svg width="16" height="16" viewBox="0 0 24 24"
                     fill="none" stroke="#3B6D11" stroke-width="2"
                     stroke-linecap="round" stroke-linejoin="round"
                     style="flex-shrink:0;">
                    <rect x="2" y="3" width="20" height="14" rx="2"/>
                    <path d="M8 21h8M12 17v4"/>
                </svg>
                Only teachers can add students to the system.
            </div>

            <form method="post" th:action="@{/addForm}" th:object="${studentData}">

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" th:field="*{name}" placeholder="e.g. Rahul Sharma" required/>
                </div>

                <div class="form-group">
                    <label>Roll Number</label>
                    <input type="text" th:field="*{rollNumber}" placeholder="e.g. BCA2024004" required/>
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" th:field="*{email}" placeholder="e.g. rahul@college.edu" required/>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" th:field="*{password}" placeholder="Create a password" required/>
                </div>

                <div class="form-group">
                    <label>Course</label>
                    <select th:field="*{course}">
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                        <option value="BSc CS">BSc CS</option>
                        <option value="BCA (Hons)">BCA (Hons)</option>
                    </select>
                </div>

                <div class="btn-row">
                    <a href="/" class="btn btn-secondary">Cancel</a>
                    <button type="submit" class="btn btn-primary">Add Student</button>
                </div>

            </form>

            <div th:if="${succesMSG}" class="alert alert-success" th:text="${succesMSG}"></div>
            <div th:if="${errorMSG}"  class="alert alert-error"   th:text="${errorMSG}"></div>

        </div>

        <div th:unless="${session.role == 'TEACHER' or true}">
            <div class="access-denied">
                <div class="lock-icon">🔒</div>
                <h3>Access Restricted</h3>
                <p>Only teachers are allowed to add students.<br/>Please log in with a teacher account.</p>
                <a th:href="@{/}">Go to Login</a>
            </div>
        </div>

    </div>
</div>

<script>
    function toggleUserMenu() {
        const d = document.getElementById('userDropdown');
        d.style.display = d.style.display === 'block' ? 'none' : 'block';
    }
    document.addEventListener('click', function(e) {
        const menu = document.getElementById('userDropdown');
        if (!e.target.closest('[onclick="toggleUserMenu()"]') &&
            !e.target.closest('#userDropdown')) {
            menu.style.display = 'none';
        }
    });
</script>
</body>
</html>
