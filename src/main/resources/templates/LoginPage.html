<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Login - Attendance System</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Serif+Display&display=swap" rel="stylesheet"/>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .wrap { width: 100%; max-width: 440px; }

        /* ── BRAND ── */
        .brand { text-align: center; margin-bottom: 2rem; }
        .brand-icon {
            width: 52px; height: 52px;
            background: #2563eb;
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }
        .brand-icon svg { width: 26px; height: 26px; fill: none; stroke: #fff; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; }
        .brand h1 { font-family: 'DM Serif Display', serif; font-size: 24px; font-weight: 400; color: #1a1a2e; }
        .brand p  { font-size: 13px; color: #666; margin-top: 4px; }

        /* ── CARD ── */
        .card {
            background: #fff;
            border: 0.5px solid #e0e0e0;
            border-radius: 16px;
            padding: 28px;
            overflow: hidden;
        }

        /* ── ACCENT BAR ── */
        .accent-bar {
            height: 3px;
            margin: -28px -28px 28px -28px;
            background: #2563eb;
            transition: background 0.3s;
        }

        /* ── ROLE TABS ── */
        .role-tabs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            background: #f0f2f5;
            border-radius: 10px;
            padding: 4px;
            margin-bottom: 22px;
        }
        .role-tab {
            padding: 9px;
            border: none;
            border-radius: 8px;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            background: transparent;
            color: #888;
            transition: all 0.2s;
        }
        .role-tab.active {
            background: #fff;
            color: #1a1a2e;
            border: 0.5px solid #e0e0e0;
        }

        /* ── MODE TABS ── */
        .mode-tabs {
            display: flex;
            border-bottom: 0.5px solid #e0e0e0;
            margin-bottom: 22px;
        }
        .mode-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: transparent;
            font-family: 'DM Sans', sans-serif;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            color: #888;
            border-bottom: 2px solid transparent;
            margin-bottom: -0.5px;
            transition: all 0.2s;
        }
        .mode-tab.active       { color: #2563eb; border-bottom-color: #2563eb; }
        .mode-tab.active.green { color: #3B6D11; border-bottom-color: #3B6D11; }

        /* ── BADGE ── */
        .badge {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            font-size: 11px;
            font-weight: 500;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 18px;
        }
        .badge-student { background: #E6F1FB; color: #0C447C; }
        .badge-teacher { background: #EAF3DE; color: #27500A; }

        /* ── FORM ── */
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            font-size: 11px;
            font-weight: 600;
            color: #666;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .form-group input,
        .form-group select {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 0.5px solid #ccc;
            border-radius: 8px;
            background: #fff;
            color: #1a1a2e;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-group input:focus,
        .form-group select:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .form-group input.green:focus,
        .form-group select.green:focus {
            border-color: #3B6D11;
            box-shadow: 0 0 0 3px rgba(59,109,17,0.1);
        }

        /* ── FORGOT ── */
        .forgot {
            text-align: right;
            font-size: 12px;
            color: #2563eb;
            cursor: pointer;
            margin-top: -8px;
            margin-bottom: 16px;
        }
        .forgot:hover { text-decoration: underline; }

        /* ── BUTTONS ── */
        .btn-submit {
            width: 100%;
            height: 43px;
            border: none;
            border-radius: 10px;
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.15s, transform 0.1s;
            margin-top: 6px;
            color: #fff;
        }
        .btn-submit.blue        { background: #2563eb; }
        .btn-submit.blue:hover  { background: #1d4ed8; }
        .btn-submit.green       { background: #3B6D11; }
        .btn-submit.green:hover { background: #27500A; }
        .btn-submit:active      { transform: scale(0.99); }

        /* ── FOOTER ── */
        .footer-link { text-align: center; font-size: 12px; color: #888; margin-top: 16px; }
        .footer-link a { color: #2563eb; font-weight: 500; text-decoration: none; }
        .footer-link a:hover { text-decoration: underline; }
        .footer-link a.green { color: #3B6D11; }

        /* ── ALERTS ── */
        .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
        .alert-error   { background: #fcebeb; color: #a32d2d; border: 0.5px solid #f7c1c1; }
        .alert-success { background: #eaf3de; color: #3b6d11; border: 0.5px solid #c0dd97; }

        @media (max-width: 480px) {
            .row2 { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="wrap">

    <!-- Brand -->
    <div class="brand">
        <div class="brand-icon">
            <svg viewBox="0 0 24 24">
                <path d="M22 10v6M2 10l10-5 10 5-10 5-10-5z"/>
                <path d="M6 12v5c3 3 9 3 12 0v-5"/>
            </svg>
        </div>
        <h1>Attendance System</h1>
        <p>Sign in or create an account to continue</p>
    </div>

    <!-- Card -->
    <div class="card">
        <div class="accent-bar" id="accentBar"></div>

        <!-- Flash messages -->
        <div th:if="${error}"   class="alert alert-error"   th:text="${error}"></div>
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <!-- Role tabs -->
        <div class="role-tabs">
            <button type="button" class="role-tab active" id="tabStudent" onclick="setRole('student')">🎓 Student</button>
            <button type="button" class="role-tab"        id="tabTeacher" onclick="setRole('teacher')">📋 Teacher</button>
        </div>

        <!-- Mode tabs — both always visible ✅ -->
        <div class="mode-tabs">
            <button type="button" class="mode-tab active" id="modeLogin"  onclick="setMode('login')">Sign in</button>
            <button type="button" class="mode-tab"        id="modeSignup" onclick="setMode('signup')">Sign up</button>
        </div>

        <!-- Badge -->
        <div id="badgeWrap"></div>

        <!-- ── LOGIN FORM ── -->
        <div id="loginForm">
            <form method="post" th:action="@{/login}">
                <!-- ✅ name="role" sends role value to controller -->
                <input type="hidden" name="role" id="loginRole" value="student"/>
                <div class="form-group">
                    <label>Email address</label>
                    <!-- ✅ name="email" matches @RequestParam("email") in controller -->
                    <input type="email" name="email" id="loginEmail" placeholder="Enter your email" required/>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Enter your password" required/>
                </div>
                <div class="forgot">Forgot password?</div>
                <button type="submit" class="btn-submit blue" id="loginBtn">Sign in</button>
            </form>
            <!-- ✅ Always visible — no display:none -->
            <div class="footer-link" id="signupFooter">
                Don't have an account?
                <a href="#" onclick="setMode('signup'); return false;" id="toSignup">Sign up</a>
            </div>
        </div>

        <!-- ── SIGNUP FORM ── -->
        <div id="signupForm" style="display:none;">
            <form method="post" th:action="@{/register}">
                <input type="hidden" name="role" id="signupRole" value="STUDENT"/>

                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="name" placeholder="e.g. Rahul Sharma" required/>
                </div>

                <div class="form-group">
                    <label>Email address</label>
                    <input type="email" name="email" placeholder="Enter your email" required/>
                </div>

                <!-- Student fields -->
                <div id="studentFields">
                    <div class="form-group">
                        <label>Roll number</label>
                        <input type="text" name="rollNumber" placeholder="e.g. BCA-2024-042"/>
                    </div>
                    <div class="form-group">
                        <label>Course</label>
                        <select name="course">
                            <option value="">Select course</option>
                            <option value="BCA">BCA</option>
                            <option value="MCA">MCA</option>
                            <option value="BSc CS">BSc CS</option>
                            <option value="BCA Hons">BCA Hons</option>
                        </select>
                    </div>
                </div>

                <!-- Teacher fields -->
                <div id="teacherFields" style="display:none;">
                    <div class="form-group">
                        <label>Department</label>
                        <select name="department">
                            <option value="">Select department</option>
                            <option value="Computer Science">Computer Science</option>
                            <option value="Mathematics">Mathematics</option>
                            <option value="Physics">Physics</option>
                            <option value="English">English</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label>Password</label>
                    <input type="password" name="password" placeholder="Create a strong password" required/>
                </div>

                <button type="submit" class="btn-submit blue" id="signupBtn">Create account</button>
            </form>
            <div class="footer-link">
                Already have an account?
                <a href="#" onclick="setMode('login'); return false;" id="toLogin">Sign in</a>
            </div>
        </div>

    </div>
</div>

<script>
    let role = 'student';
    let mode = 'login';

    function setRole(r) {
        role = r;
        const isTeacher = r === 'teacher';

        document.getElementById('tabStudent').className = 'role-tab' + (r === 'student' ? ' active' : '');
        document.getElementById('tabTeacher').className = 'role-tab' + (r === 'teacher' ? ' active' : '');

        document.getElementById('accentBar').style.background = isTeacher ? '#3B6D11' : '#2563eb';
        document.getElementById('loginRole').value  = r;
        document.getElementById('signupRole').value = isTeacher ? 'TEACHER' : 'STUDENT';

        document.getElementById('loginBtn').className  = 'btn-submit ' + (isTeacher ? 'green' : 'blue');
        document.getElementById('signupBtn').className = 'btn-submit ' + (isTeacher ? 'green' : 'blue');

        document.getElementById('studentFields').style.display = isTeacher ? 'none' : 'block';
        document.getElementById('teacherFields').style.display = isTeacher ? 'block' : 'none';

        document.getElementById('toSignup').className = isTeacher ? 'green' : '';
        document.getElementById('toLogin').className  = isTeacher ? 'green' : '';

        // ✅ Sign up tab always visible for BOTH student and teacher
        document.getElementById('modeSignup').style.display   = 'block';
        document.getElementById('signupFooter').style.display = 'block';

        // ✅ Do NOT force back to login when switching roles
        updateBadge();
    }

    function setMode(m) {
        mode = m;
        const isTeacher = role === 'teacher';

        document.getElementById('modeLogin').className  = 'mode-tab' + (m === 'login'  ? ' active' + (isTeacher ? ' green' : '') : '');
        document.getElementById('modeSignup').className = 'mode-tab' + (m === 'signup' ? ' active' + (isTeacher ? ' green' : '') : '');

        document.getElementById('loginForm').style.display  = m === 'login'  ? 'block' : 'none';
        document.getElementById('signupForm').style.display = m === 'signup' ? 'block' : 'none';
    }

    function updateBadge() {
        const isTeacher = role === 'teacher';
        document.getElementById('badgeWrap').innerHTML = isTeacher
            ? '<span class="badge badge-teacher">📋 Teacher portal</span>'
            : '<span class="badge badge-student">🎓 Student portal</span>';
    }

    updateBadge();
    document.getElementById('accentBar').style.background = '#2563eb';
</script>
</body>
</html>
